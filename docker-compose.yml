services:
  redis:
    image: redis:alpine
    networks:
      - internal
    restart: unless-stopped  
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: "5s"
      timeout: "3s"
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "128m"

  api:
    build: ./api
    restart: unless-stopped  
    ports:
      - "${API_PORT}:${API_PORT}"
    env_file:
      - ./api/.env
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256m"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: "10s"
      timeout: "5s"
      retries: 5

  worker:
    build: ./worker
    restart: unless-stopped  
    env_file:
      - ./worker/.env
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "128m"

  frontend:
    build: ./frontend
    restart: unless-stopped  
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    env_file:
      - ./frontend/.env
    networks:
      - internal
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "128m"

networks:
  internal:
    driver: bridge