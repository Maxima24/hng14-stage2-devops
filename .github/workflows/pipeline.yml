name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  REGISTRY: localhost:5000

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python (flake8)
        run: flake8 api/ worker/ --max-line-length=88 --exclude=.venv

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend deps
        run: cd frontend && npm install

      - name: Lint JavaScript (eslint)
        run: cd frontend && npx eslint app.js

      - name: Install hadolint
        run: |
          wget -qO /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles (hadolint)
        run: |
          hadolint api/Dockerfile
          hadolint frontend/Dockerfile
          hadolint worker/Dockerfile

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd api
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests with coverage
        run: |
          cd api
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.REGISTRY }}/api:${{ github.sha }}
            ${{ env.REGISTRY }}/api:latest

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/worker:${{ github.sha }}
            ${{ env.REGISTRY }}/worker:latest

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/frontend:latest

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Rebuild images for scanning
        run: |
          docker build -t ${{ env.REGISTRY }}/api:latest ./api
          docker build -t ${{ env.REGISTRY }}/worker:latest ./worker
          docker build -t ${{ env.REGISTRY }}/frontend:latest ./frontend

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Scan API image
        run: |
          trivy image --exit-code 1 --severity CRITICAL \
            --format sarif --output api-scan.sarif \
            ${{ env.REGISTRY }}/api:latest

      - name: Scan Worker image
        run: |
          trivy image --exit-code 1 --severity CRITICAL \
            --format sarif --output worker-scan.sarif \
            ${{ env.REGISTRY }}/worker:latest

      - name: Scan Frontend image
        run: |
          trivy image --exit-code 1 --severity CRITICAL \
            --format sarif --output frontend-scan.sarif \
            ${{ env.REGISTRY }}/frontend:latest

      - name: Upload SARIF results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-results
          path: "*.sarif"

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create env files
        run: |
          echo "REDIS_HOST=redis" > api/.env
          echo "REDIS_HOST=redis" > worker/.env
          echo "API_URL=http://api:8000" > frontend/.env
          echo "PORT=3000" >> frontend/.env
          echo "API_PORT=${{ secrets.API_PORT }}" > .env
          echo "FRONTEND_PORT=${{ secrets.FRONTEND_PORT }}" >> .env

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait for stack to be healthy
        run: |
          echo "Waiting for services..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo "API is healthy"
              break
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 3
          done

      - name: Wait for frontend
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3000; then
              echo "Frontend is up"
              break
            fi
            sleep 3
          done

      - name: Submit a job
        run: |
          JOB_RESPONSE=$(curl -sf -X POST http://localhost:3000/submit)
          echo "Job response: $JOB_RESPONSE"
          JOB_ID=$(echo $JOB_RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Poll until job completes
        run: |
          for i in $(seq 1 20); do
            STATUS=$(curl -sf http://localhost:3000/status/${{ env.JOB_ID }} | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
            echo "Status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully"
              exit 0
            fi
            sleep 3
          done
          echo "Job did not complete in time"
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create env files
        run: |
          echo "REDIS_HOST=redis" > api/.env
          echo "REDIS_HOST=redis" > worker/.env
          echo "API_URL=http://api:8000" > frontend/.env
          echo "PORT=3000" >> frontend/.env
          echo "API_PORT=${{ secrets.API_PORT }}" > .env
          echo "FRONTEND_PORT=${{ secrets.FRONTEND_PORT }}" >> .env

      - name: Build new images
        run: docker compose build

      - name: Rolling update API
        run: |
          OLD_CONTAINER=$(docker ps -q --filter "name=api" | head -1)

          docker compose up -d --no-deps --scale api=2 --no-recreate api

          echo "Waiting for new API container to be healthy..."
          NEW_CONTAINER=$(docker ps -q --filter "name=api" | grep -v $OLD_CONTAINER | head -1)

          for i in $(seq 1 12); do
            if docker inspect --format='{{.State.Health.Status}}' $NEW_CONTAINER 2>/dev/null | grep -q "healthy"; then
              echo "New container is healthy, stopping old container"
              docker stop $OLD_CONTAINER
              docker rm $OLD_CONTAINER
              exit 0
            fi
            echo "Attempt $i/12 - waiting for health check..."
            sleep 5
          done

          echo "Health check failed within 60s, aborting — old container still running"
          docker stop $NEW_CONTAINER
          docker rm $NEW_CONTAINER
          exit 1

      - name: Rolling update Worker
        run: docker compose up -d --no-deps worker

      - name: Rolling update Frontend
        run: docker compose up -d --no-deps frontend